<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <!-- Static form so Netlify detects and registers it at build time.
         The live form is rendered by React and posts to this same name. -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
