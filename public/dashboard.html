<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Visitor Dashboard</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #050505; color: #e5e5e5; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 40px 20px 80px; }
      h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; color: #fff; }
      .sub { color: #8a8a8a; margin-top: 4px; font-size: 0.9rem; }
      .gate { max-width: 360px; margin: 18vh auto 0; text-align: center; }
      .gate h1 { font-size: 1.5rem; }
      input {
        width: 100%; margin-top: 18px; padding: 12px 16px; border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
        color: #fff; font-size: 0.95rem; outline: none;
      }
      input:focus { border-color: rgba(255,255,255,0.4); }
      button {
        margin-top: 12px; width: 100%; padding: 12px; border: none; border-radius: 999px;
        background: #fff; color: #000; font-weight: 600; font-size: 0.9rem; cursor: pointer;
      }
      button:hover { background: #d4d4d8; }
      .pwrow { position: relative; margin-top: 18px; }
      .pwrow input { margin-top: 0; padding-right: 66px; }
      .eye {
        position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
        width: auto; margin: 0; padding: 7px 12px; background: transparent;
        color: #9a9a9a; font-size: 0.78rem; font-weight: 500; border-radius: 8px;
      }
      .eye:hover { color: #fff; background: rgba(255,255,255,0.08); }
      .err { color: #f87171; margin-top: 12px; font-size: 0.85rem; min-height: 1em; }
      .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 24px 0 28px; }
      .card { border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); border-radius: 16px; padding: 18px; }
      .card .num { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; color: #fff; }
      .card .lbl { color: #8a8a8a; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 6px; }
      .tablewrap { border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; overflow: hidden; }
      table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
      th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); white-space: nowrap; }
      th { color: #8a8a8a; font-weight: 500; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.08em; background: rgba(255,255,255,0.02); }
      tr:last-child td { border-bottom: none; }
      tr:hover td { background: rgba(255,255,255,0.02); }
      .pill { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 0.72rem; border: 1px solid rgba(255,255,255,0.15); color: #cfcfcf; }
      .repeat { background: #fff; color: #000; border-color: #fff; font-weight: 600; }
      .muted { color: #777; }
      .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
      .refresh { width: auto; padding: 9px 18px; background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.15); }
      .refresh:hover { background: rgba(255,255,255,0.06); }
      .scroll { overflow-x: auto; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <!-- Password gate -->
      <div id="gate" class="gate">
        <h1>Visitor Dashboard</h1>
        <p class="sub">Enter password to view.</p>
        <div class="pwrow">
          <input id="pw" type="password" placeholder="Password" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
          <button id="toggle" type="button" class="eye" aria-label="Show password">show</button>
        </div>
        <button id="enter">Unlock</button>
        <div id="err" class="err"></div>
        <p class="sub" style="margin-top: 14px; font-size: 0.8rem">
          Tip: click <strong>show</strong> to check what you typed.
        </p>
      </div>

      <!-- Dashboard -->
      <div id="dash" style="display: none">
        <div class="topbar">
          <div>
            <h1>Visitor Dashboard</h1>
            <p class="sub" id="updated"></p>
          </div>
          <button class="refresh" id="refresh">↻ Refresh</button>
        </div>
        <div class="cards" id="cards"></div>
        <div class="tablewrap scroll">
          <table>
            <thead>
              <tr>
                <th>When</th>
                <th>Location</th>
                <th>Device</th>
                <th>Browser / OS</th>
                <th>Came from</th>
                <th>Visitor</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id)

      function flag(code) {
        if (!code || code.length !== 2) return ''
        return String.fromCodePoint(...[...code.toUpperCase()].map((c) => 127397 + c.charCodeAt(0)))
      }
      function timeAgo(iso) {
        const d = new Date(iso)
        const s = Math.floor((Date.now() - d.getTime()) / 1000)
        if (s < 60) return s + 's ago'
        if (s < 3600) return Math.floor(s / 60) + 'm ago'
        if (s < 86400) return Math.floor(s / 3600) + 'h ago'
        return Math.floor(s / 86400) + 'd ago'
      }
      function fmt(iso) {
        return new Date(iso).toLocaleString('en-IN', {
          dateStyle: 'medium',
          timeStyle: 'short',
        })
      }

      async function load(pw) {
        $('err').textContent = ''
        try {
          const res = await fetch('/.netlify/functions/visits?key=' + encodeURIComponent(pw))
          if (res.status === 401) {
            $('err').textContent = 'Wrong password.'
            return false
          }
          if (!res.ok) {
            $('err').textContent = 'Error loading data.'
            return false
          }
          const { visits } = await res.json()
          render(visits || [])
          sessionStorage.setItem('dpw', pw)
          $('gate').style.display = 'none'
          $('dash').style.display = 'block'
          return true
        } catch (e) {
          $('err').textContent = 'Network error. Is this the live site?'
          return false
        }
      }

      function render(visits) {
        const counts = {}
        visits.forEach((v) => (counts[v.visitorId] = (counts[v.visitorId] || 0) + 1))
        const unique = Object.keys(counts).length
        const returning = Object.values(counts).filter((c) => c > 1).length

        const cards = [
          ['Total visits', visits.length],
          ['Unique visitors', unique],
          ['Returning', returning],
          ['Countries', new Set(visits.map((v) => v.country).filter(Boolean)).size],
        ]
        $('cards').innerHTML = cards
          .map((c) => `<div class="card"><div class="num">${c[1]}</div><div class="lbl">${c[0]}</div></div>`)
          .join('')

        const rows = [...visits].reverse()
        $('rows').innerHTML = rows
          .map((v) => {
            const loc = [v.city, v.country].filter(Boolean).join(', ') || '—'
            const n = counts[v.visitorId]
            const visitorPill =
              n > 1
                ? `<span class="pill repeat">×${n} repeat</span>`
                : `<span class="pill">new</span>`
            const ref = v.referrer ? new URL(v.referrer).hostname.replace('www.', '') : 'Direct'
            return `<tr>
              <td>${fmt(v.time)}<br><span class="muted">${timeAgo(v.time)}</span></td>
              <td>${flag(v.countryCode)} ${loc}${v.region ? `<br><span class="muted">${v.region}</span>` : ''}</td>
              <td>${v.device || '—'}</td>
              <td>${v.browser || '—'}<br><span class="muted">${v.os || ''}</span></td>
              <td>${ref}</td>
              <td><span class="muted">${(v.visitorId || '').slice(0, 8)}</span><br>${visitorPill}</td>
            </tr>`
          })
          .join('')

        $('updated').textContent = 'Last updated ' + new Date().toLocaleTimeString()
      }

      $('enter').onclick = () => load($('pw').value)
      $('pw').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') load($('pw').value)
      })
      $('refresh').onclick = () => load(sessionStorage.getItem('dpw') || '')

      // Show / hide password
      $('toggle').onclick = () => {
        const input = $('pw')
        const show = input.type === 'password'
        input.type = show ? 'text' : 'password'
        $('toggle').textContent = show ? 'hide' : 'show'
        input.focus()
      }

      // Auto-load if password remembered this session
      const saved = sessionStorage.getItem('dpw')
      if (saved) load(saved)
    </script>
  </body>
</html>
