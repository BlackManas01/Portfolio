<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Visitor Dashboard</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #050505; color: #e5e5e5; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 40px 20px 80px; }
      h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; color: #fff; }
      .sub { color: #8a8a8a; margin-top: 4px; font-size: 0.9rem; }
      .gate { max-width: 360px; margin: 18vh auto 0; text-align: center; }
      .gate h1 { font-size: 1.5rem; }
      input {
        width: 100%; margin-top: 18px; padding: 12px 16px; border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
        color: #fff; font-size: 0.95rem; outline: none;
      }
      input:focus { border-color: rgba(255,255,255,0.4); }
      button {
        margin-top: 12px; width: 100%; padding: 12px; border: none; border-radius: 999px;
        background: #fff; color: #000; font-weight: 600; font-size: 0.9rem; cursor: pointer;
      }
      button:hover { background: #d4d4d8; }
      .pwrow { position: relative; margin-top: 18px; }
      .pwrow input { margin-top: 0; padding-right: 66px; }
      .eye {
        position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
        width: auto; margin: 0; padding: 7px 12px; background: transparent;
        color: #9a9a9a; font-size: 0.78rem; font-weight: 500; border-radius: 8px;
      }
      .eye:hover { color: #fff; background: rgba(255,255,255,0.08); }
      .err { color: #f87171; margin-top: 12px; font-size: 0.85rem; min-height: 1em; }
      .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 24px 0 28px; }
      .card { border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); border-radius: 16px; padding: 18px; }
      .card .num { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; color: #fff; }
      .card .lbl { color: #8a8a8a; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 6px; }
      .tablewrap { border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; overflow: hidden; }
      table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
      th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); white-space: nowrap; }
      th { color: #8a8a8a; font-weight: 500; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.08em; background: rgba(255,255,255,0.02); }
      tr:last-child td { border-bottom: none; }
      tr:hover td { background: rgba(255,255,255,0.02); }
      .pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 0.68rem; border: 1px solid rgba(255,255,255,0.14); color: #8f8f8f; }
      .repeat { border-color: rgba(255,255,255,0.32); color: #fff; background: rgba(255,255,255,0.06); font-weight: 500; }
      .muted { color: #777; }
      .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
      .refresh { width: auto; padding: 9px 18px; background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.15); }
      .refresh:hover { background: rgba(255,255,255,0.06); }
      .refresh:disabled { opacity: 0.5; cursor: default; }
      .scroll { overflow-x: auto; }
      .actions { display: flex; gap: 8px; }
      .ghost { width: auto; padding: 9px 16px; background: transparent; color: #cfcfcf; border: 1px solid rgba(255,255,255,0.15); }
      .ghost:hover { background: rgba(255,255,255,0.06); color: #fff; }
      .filters { display: flex; gap: 10px; flex-wrap: wrap; margin: 0 0 16px; }
      .filters input {
        margin: 0; padding: 9px 14px; border-radius: 10px; font-size: 0.82rem;
        background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); color: #fff;
        outline: none; min-width: 220px; flex: 1;
      }
      .filters input:focus { border-color: rgba(255,255,255,0.4); box-shadow: none; }
      /* Custom dropdowns (native selects ignore CSS colors in their popup) */
      .dd { position: relative; }
      .dd-btn {
        width: auto; margin: 0; padding: 9px 34px 9px 14px; border-radius: 10px; font-size: 0.82rem;
        background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); color: #fff;
        text-align: left; cursor: pointer; position: relative; min-width: 140px;
      }
      .dd-btn:hover { background: rgba(255,255,255,0.06); }
      .dd-btn::after { content: '▾'; position: absolute; right: 13px; top: 50%; transform: translateY(-50%); color: #8a8a8a; font-size: 0.7rem; }
      .dd.open .dd-btn { border-color: rgba(255,255,255,0.4); }
      .dd-menu {
        display: none; position: absolute; top: calc(100% + 6px); left: 0; min-width: 100%;
        background: #0c0c0c; border: 1px solid rgba(255,255,255,0.14); border-radius: 12px; padding: 6px;
        z-index: 30; max-height: 260px; overflow-y: auto; box-shadow: 0 12px 32px rgba(0,0,0,0.55);
      }
      .dd.open .dd-menu { display: block; }
      .dd-item { padding: 8px 12px; border-radius: 8px; font-size: 0.82rem; color: #cfcfcf; cursor: pointer; white-space: nowrap; }
      .dd-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
      .dd-item.sel { background: rgba(255,255,255,0.14); color: #fff; }
      .ddtoggle { width: auto; margin: 0; padding: 9px 16px; border-radius: 10px; font-size: 0.82rem; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); color: #cfcfcf; cursor: pointer; }
      .ddtoggle:hover { background: rgba(255,255,255,0.06); color: #fff; }
      .ddtoggle.on { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.32); }
      tbody tr { cursor: pointer; }
      .empty { text-align: center; color: #777; padding: 32px; }
      /* Detail modal */
      .modal-bg {
        position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
        display: none; align-items: center; justify-content: center; padding: 20px; z-index: 50;
      }
      .modal-bg.open { display: flex; }
      .modal {
        width: 100%; max-width: 460px; background: #0c0c0c; border: 1px solid rgba(255,255,255,0.12);
        border-radius: 18px; padding: 24px; max-height: 85vh; overflow-y: auto;
      }
      .modal h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.15rem; color: #fff; }
      .modal .close { width: auto; margin: 0; padding: 6px 12px; background: transparent; color: #9a9a9a; border: 1px solid rgba(255,255,255,0.15); font-size: 0.78rem; }
      .modal .close:hover { color: #fff; background: rgba(255,255,255,0.06); }
      .mhead { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; }
      .drow { display: flex; justify-content: space-between; gap: 16px; padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.86rem; }
      .drow:last-child { border-bottom: none; }
      .drow .k { color: #8a8a8a; }
      .drow .v { color: #fff; text-align: right; word-break: break-word; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <!-- Password gate -->
      <div id="gate" class="gate">
        <h1>Visitor Dashboard</h1>
        <p class="sub">Enter password to view.</p>
        <div class="pwrow">
          <input id="pw" type="password" placeholder="Password" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
          <button id="toggle" type="button" class="eye" aria-label="Show password">show</button>
        </div>
        <button id="enter">Unlock</button>
        <div id="err" class="err"></div>
        <p class="sub" style="margin-top: 14px; font-size: 0.8rem">
          Tip: click <strong>show</strong> to check what you typed.
        </p>
      </div>

      <!-- Dashboard -->
      <div id="dash" style="display: none">
        <div class="topbar">
          <div>
            <h1>Visitor Dashboard</h1>
            <p class="sub" id="updated"></p>
          </div>
          <div class="actions">
            <button class="ghost" id="clear">Clear data</button>
            <button class="refresh" id="refresh">↻ Refresh</button>
          </div>
        </div>
        <div class="cards" id="cards"></div>
        <div class="filters">
          <input id="search" type="text" placeholder="Search location, browser, referrer, visitor…" />
          <div class="dd" id="ddCountry"><button type="button" class="dd-btn">All countries</button><div class="dd-menu"></div></div>
          <div class="dd" id="ddDevice"><button type="button" class="dd-btn">All devices</button><div class="dd-menu"></div></div>
          <div class="dd" id="ddVisitor"><button type="button" class="dd-btn">All visitors</button><div class="dd-menu"></div></div>
          <button type="button" id="groupBtn" class="ddtoggle on">Grouped by visitor</button>
        </div>
        <div class="tablewrap scroll">
          <table>
            <thead>
              <tr>
                <th>When</th>
                <th>Location</th>
                <th>Device</th>
                <th>Browser / OS</th>
                <th>Came from</th>
                <th>Visitor</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Detail modal -->
    <div class="modal-bg" id="modalBg">
      <div class="modal">
        <div class="mhead">
          <h2>Visit details</h2>
          <button class="close" id="modalClose">close</button>
        </div>
        <div id="modalBody"></div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id)

      const FILTERS = { country: '', device: '', visitor: '' }

      function buildDropdown(elId, items, key, defaultLabel) {
        const dd = $(elId)
        const btn = dd.querySelector('.dd-btn')
        const menu = dd.querySelector('.dd-menu')
        const opts = [{ value: '', label: defaultLabel }, ...items]
        // If the previously selected value no longer exists, reset to default.
        if (!opts.some((o) => o.value === FILTERS[key])) FILTERS[key] = ''
        menu.innerHTML = opts
          .map((o) => `<div class="dd-item${o.value === FILTERS[key] ? ' sel' : ''}" data-v="${esc(o.value)}">${esc(o.label)}</div>`)
          .join('')
        const cur = opts.find((o) => o.value === FILTERS[key]) || opts[0]
        btn.textContent = cur.label
        menu.querySelectorAll('.dd-item').forEach((it) => {
          it.onclick = () => {
            FILTERS[key] = it.dataset.v
            btn.textContent = it.textContent
            menu.querySelectorAll('.dd-item').forEach((x) => x.classList.remove('sel'))
            it.classList.add('sel')
            dd.classList.remove('open')
            applyFilters()
          }
        })
        btn.onclick = (e) => {
          e.stopPropagation()
          const wasOpen = dd.classList.contains('open')
          document.querySelectorAll('.dd.open').forEach((x) => x.classList.remove('open'))
          if (!wasOpen) dd.classList.add('open')
        }
      }
      document.addEventListener('click', () =>
        document.querySelectorAll('.dd.open').forEach((x) => x.classList.remove('open')),
      )

      function flag(code) {
        if (!code || code.length !== 2) return ''
        return String.fromCodePoint(...[...code.toUpperCase()].map((c) => 127397 + c.charCodeAt(0)))
      }
      function timeAgo(iso) {
        const d = new Date(iso)
        const s = Math.floor((Date.now() - d.getTime()) / 1000)
        if (s < 60) return s + 's ago'
        if (s < 3600) return Math.floor(s / 60) + 'm ago'
        if (s < 86400) return Math.floor(s / 3600) + 'h ago'
        return Math.floor(s / 86400) + 'd ago'
      }
      function fmt(iso) {
        return new Date(iso).toLocaleString('en-IN', {
          dateStyle: 'medium',
          timeStyle: 'short',
        })
      }

      let ALL = [] // every visit, newest-first
      let COUNTS = {} // visitorId -> total visits

      async function load(pw, silent) {
        $('err').textContent = ''
        const btn = $('refresh')
        const wasDash = $('dash').style.display === 'block'
        if (wasDash && !silent) {
          btn.disabled = true
          btn.textContent = '↻ Refreshing…'
        }
        try {
          const res = await fetch('/.netlify/functions/visits?key=' + encodeURIComponent(pw), { cache: 'no-store' })
          if (res.status === 401) {
            $('err').textContent = 'Wrong password.'
            return false
          }
          if (!res.ok) {
            $('err').textContent = 'Error loading data.'
            return false
          }
          const { visits } = await res.json()
          ingest(visits || [])
          sessionStorage.setItem('dpw', pw)
          $('gate').style.display = 'none'
          $('dash').style.display = 'block'
          startAuto()
          return true
        } catch (e) {
          if (!silent) $('err').textContent = 'Network error. Is this the live site?'
          return false
        } finally {
          btn.disabled = false
          btn.textContent = '↻ Refresh'
        }
      }

      // Auto-refresh every 60s while viewing the dashboard (paused if a modal is open).
      let AUTO = null
      function startAuto() {
        if (AUTO) return
        AUTO = setInterval(() => {
          const pw = sessionStorage.getItem('dpw')
          if (pw && $('dash').style.display === 'block' && !$('modalBg').classList.contains('open')) {
            load(pw, true)
          }
        }, 30000)
      }

      function ingest(visits) {
        COUNTS = {}
        visits.forEach((v) => (COUNTS[v.visitorId] = (COUNTS[v.visitorId] || 0) + 1))
        ALL = [...visits].reverse() // newest first

        // Summary cards (always reflect the full dataset)
        const unique = Object.keys(COUNTS).length
        const returning = Object.values(COUNTS).filter((c) => c > 1).length
        const cards = [
          ['Total visits', visits.length],
          ['Unique visitors', unique],
          ['Returning', returning],
          ['Countries', new Set(visits.map((v) => v.country).filter(Boolean)).size],
        ]
        $('cards').innerHTML = cards
          .map((c) => `<div class="card"><div class="num">${c[1]}</div><div class="lbl">${c[0]}</div></div>`)
          .join('')

        // Populate filter dropdowns
        const countries = [...new Set(ALL.map((v) => v.country).filter(Boolean))].sort()
        buildDropdown('ddCountry', countries.map((c) => ({ value: c, label: c })), 'country', 'All countries')
        const devices = [...new Set(ALL.map((v) => v.device).filter(Boolean))].sort()
        buildDropdown('ddDevice', devices.map((d) => ({ value: d, label: d })), 'device', 'All devices')
        buildDropdown(
          'ddVisitor',
          [{ value: 'new', label: 'New only' }, { value: 'repeat', label: 'Returning only' }],
          'visitor',
          'All visitors',
        )

        applyFilters()
        $('updated').textContent = 'Last updated ' + new Date().toLocaleTimeString() + ' · auto-refreshes every 30s'
      }

      function esc(s) {
        return String(s).replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]))
      }
      function refOf(v) {
        if (!v.referrer) return 'Direct'
        try {
          return new URL(v.referrer).hostname.replace('www.', '')
        } catch {
          return v.referrer
        }
      }

      function applyFilters() {
        const q = $('search').value.trim().toLowerCase()
        const country = FILTERS.country
        const device = FILTERS.device
        const vis = FILTERS.visitor

        const filtered = ALL.filter((v) => {
          if (country && v.country !== country) return false
          if (device && v.device !== device) return false
          const repeat = (COUNTS[v.visitorId] || 0) > 1
          if (vis === 'new' && repeat) return false
          if (vis === 'repeat' && !repeat) return false
          if (q) {
            const hay = [v.city, v.region, v.country, v.browser, v.os, v.device, refOf(v), v.visitorId, v.path]
              .filter(Boolean)
              .join(' ')
              .toLowerCase()
            if (!hay.includes(q)) return false
          }
          return true
        })

        let list = filtered
        if (GROUPED) {
          const seen = new Set()
          list = filtered.filter((v) => {
            if (seen.has(v.visitorId)) return false
            seen.add(v.visitorId)
            return true
          })
        }

        if (!list.length) {
          $('rows').innerHTML = '<tr><td colspan="6" class="empty">No visits match your filters.</td></tr>'
          return
        }

        $('rows').innerHTML = list
          .map((v) => {
            const loc = [v.city, v.country].filter(Boolean).join(', ') || '—'
            const n = COUNTS[v.visitorId]
            const visitorPill = n > 1 ? `<span class="pill repeat">${n} visits</span>` : `<span class="pill">new</span>`
            return `<tr data-i="${ALL.indexOf(v)}">
              <td>${fmt(v.time)}<br><span class="muted">${timeAgo(v.time)}</span></td>
              <td>${flag(v.countryCode)} ${esc(loc)}${v.region ? `<br><span class="muted">${esc(v.region)}</span>` : ''}</td>
              <td>${esc(v.device || '—')}</td>
              <td>${esc(v.browser || '—')}<br><span class="muted">${esc(v.os || '')}</span></td>
              <td>${esc(refOf(v))}</td>
              <td><span class="muted">${esc((v.visitorId || '').slice(0, 8))}</span><br>${visitorPill}</td>
            </tr>`
          })
          .join('')
      }

      function openDetail(v) {
        const n = COUNTS[v.visitorId] || 1
        const rows = [
          ['When', fmt(v.time) + ' (' + timeAgo(v.time) + ')'],
          ['City', v.city || '—'],
          ['Region', v.region || '—'],
          ['Country', (flag(v.countryCode) + ' ' + (v.country || '—')).trim()],
          ['Timezone', v.timezone || '—'],
          ['Device', v.device || '—'],
          ['Browser', v.browser || '—'],
          ['OS', v.os || '—'],
          ['Came from', refOf(v)],
          ['Landed on', v.path || '/'],
          ['Visitor ID', v.visitorId || '—'],
          ['Visits by this visitor', n + (n > 1 ? ' (returning)' : ' (new)')],
        ]
        $('modalBody').innerHTML = rows
          .map((r) => `<div class="drow"><span class="k">${r[0]}</span><span class="v">${esc(r[1])}</span></div>`)
          .join('')
        $('modalBg').classList.add('open')
      }
      function closeDetail() {
        $('modalBg').classList.remove('open')
      }

      // Event wiring
      $('enter').onclick = () => load($('pw').value)
      $('pw').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') load($('pw').value)
      })
      $('refresh').onclick = () => load(sessionStorage.getItem('dpw') || '')
      $('search').addEventListener('input', applyFilters)
      let GROUPED = true
      $('groupBtn').onclick = () => {
        GROUPED = !GROUPED
        $('groupBtn').classList.toggle('on', GROUPED)
        $('groupBtn').textContent = GROUPED ? 'Grouped by visitor' : 'All visits'
        applyFilters()
      }
      $('rows').addEventListener('click', (e) => {
        const tr = e.target.closest('tr[data-i]')
        if (!tr) return
        const v = ALL[Number(tr.dataset.i)]
        if (v) openDetail(v)
      })
      $('modalClose').onclick = closeDetail
      $('modalBg').addEventListener('click', (e) => {
        if (e.target === $('modalBg')) closeDetail()
      })
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeDetail()
      })
      $('clear').onclick = async () => {
        if (!confirm('Delete ALL stored visit data? This cannot be undone.')) return
        const pw = sessionStorage.getItem('dpw') || ''
        const btn = $('clear')
        btn.disabled = true
        btn.textContent = 'Clearing…'
        try {
          const res = await fetch('/.netlify/functions/visits?key=' + encodeURIComponent(pw) + '&clear=1', { cache: 'no-store' })
          if (res.ok) {
            ingest([])
          } else {
            alert('Could not clear data.')
          }
        } catch {
          alert('Network error while clearing.')
        } finally {
          btn.disabled = false
          btn.textContent = 'Clear data'
        }
      }

      // Show / hide password
      $('toggle').onclick = () => {
        const input = $('pw')
        const show = input.type === 'password'
        input.type = show ? 'text' : 'password'
        $('toggle').textContent = show ? 'hide' : 'show'
        input.focus()
      }

      // Auto-load if password remembered this session
      const saved = sessionStorage.getItem('dpw')
      if (saved) load(saved)
    </script>
  </body>
</html>
