<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>404 — Page not found · Sudhanshu Singh</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,400&family=Inter:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050505;
        color: #fff;
        font-family: 'Inter', system-ui, sans-serif;
        text-align: center;
        padding: 24px;
        overflow: hidden;
        position: relative;
      }
      .grid {
        position: absolute; inset: 0;
        background-image: radial-gradient(circle at center, rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 44px 44px;
        -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
        mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
      }
      .content { position: relative; z-index: 1; }
      .code {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: clamp(5rem, 22vw, 12rem);
        line-height: 1;
        letter-spacing: -0.04em;
      }
      .code em { font-family: 'Fraunces', serif; font-style: italic; font-weight: 400; color: #c9c9d2; }
      .title { margin-top: 12px; font-size: 1.25rem; color: #d4d4d8; }
      .sub { margin-top: 10px; color: #8a8a8a; font-size: 0.95rem; }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 32px;
        padding: 12px 26px;
        border-radius: 999px;
        background: #fff;
        color: #000;
        font-weight: 600;
        font-size: 0.9rem;
        text-decoration: none;
        transition: background 0.2s;
      }
      .btn:hover { background: #d4d4d8; }
    </style>
  </head>
  <body>
    <div class="grid"></div>
    <div class="content">
      <div class="code">4<em>0</em>4</div>
      <div class="title">This page took a wrong turn.</div>
      <div class="sub">The page you&rsquo;re looking for doesn&rsquo;t exist or was moved.</div>
      <a class="btn" href="/">← Back to home</a>
    </div>
  </body>
</html>
